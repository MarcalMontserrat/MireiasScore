<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>🏀 Pre-Mini Marcador</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>🏀 Pre-Mini</h1>
  </header>

  <!-- QUARTER SELECTOR -->
  <section class="top-bar">
    <div class="quarter-scroll">
      <div class="quarter-group" id="quarterBtns"></div>
    </div>
  </section>

  <!-- MAIN SCOREBOARD: 2 columns -->
  <main class="scoreboard">

    <!-- TEAM A -->
    <div class="team" id="teamA">
      <input class="team-name" id="nameA" type="text" value="LOCAL" maxlength="16" autocomplete="off" />
      <div class="total-score" id="totalA">0</div>
      <div class="quarter-pts" id="qptsA">Q1 · 0</div>
      <div class="score-btns">
        <button class="btn-score" data-team="A" data-pts="1">+1</button>
        <button class="btn-score" data-team="A" data-pts="2">+2</button>
        <button class="btn-score" data-team="A" data-pts="3">+3</button>
        <button class="btn-score minus" data-team="A" data-pts="-1">−1</button>
      </div>
    </div>

    <!-- TEAM B -->
    <div class="team" id="teamB">
      <input class="team-name" id="nameB" type="text" value="VISITANTE" maxlength="16" autocomplete="off" />
      <div class="total-score" id="totalB">0</div>
      <div class="quarter-pts" id="qptsB">Q1 · 0</div>
      <div class="score-btns">
        <button class="btn-score" data-team="B" data-pts="1">+1</button>
        <button class="btn-score" data-team="B" data-pts="2">+2</button>
        <button class="btn-score" data-team="B" data-pts="3">+3</button>
        <button class="btn-score minus" data-team="B" data-pts="-1">−1</button>
      </div>
    </div>

  </main>

  <!-- BOX SCORE TABLE -->
  <section class="box-score">
    <details>
      <summary>Desglose por cuarto</summary>
      <div class="table-wrap">
        <table id="boxTable">
          <thead>
            <tr>
              <th></th>
              <th class="th-team" id="thA">LOCAL</th>
              <th class="th-team" id="thB">VISITANTE</th>
            </tr>
          </thead>
          <tbody id="boxBody"></tbody>
        </table>
      </div>
    </details>
  </section>

  <!-- BOTTOM ACTIONS -->
  <footer class="actions">
    <button class="btn-action" id="btnUndo">↩ Deshacer</button>
    <button class="btn-action danger" id="btnReset">🔄 Reiniciar</button>
  </footer>

  <!-- HISTORY -->
  <section class="history-block">
    <details>
      <summary>📋 Historial</summary>
      <ul class="history-list" id="historyList"></ul>
    </details>
  </section>

  <!-- RESET MODAL -->
  <div class="modal-overlay" id="resetModal" role="dialog" aria-modal="true">
    <div class="modal">
      <h2>¿Reiniciar partido?</h2>
      <p>Se borrarán todos los puntos, faltas e historial.</p>
      <div class="modal-btns">
        <button class="btn-action danger" id="btnConfirmReset">Sí, reiniciar</button>
        <button class="btn-action" id="btnCancelReset">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="js/state.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
