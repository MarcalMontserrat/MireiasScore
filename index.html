<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏀 Marcador de Baloncesto</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #e85d04;
      --orange-dark: #c44f03;
      --orange-light: #f48c06;
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #242424;
      --text: #f5f5f5;
      --muted: #888;
      --green: #2ec27e;
      --red: #e01b24;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 16px;
    }

    h1 {
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--orange);
      text-align: center;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 24px;
      background: var(--surface);
      border-radius: 12px;
      padding: 10px 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .period-group {
      display: flex;
      gap: 6px;
    }

    .period-btn {
      background: var(--surface2);
      border: 2px solid transparent;
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }

    .period-btn.active {
      border-color: var(--orange);
      color: var(--orange);
    }

    .period-btn:hover:not(.active) {
      border-color: var(--surface2);
      color: var(--text);
    }

    /* ── TIMER ── */
    .timer-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .timer-display {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: 4px;
      line-height: 1;
      cursor: pointer;
      color: var(--text);
      transition: color .15s;
    }

    .timer-display.running { color: var(--green); }
    .timer-display.low     { color: var(--red); }

    .timer-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-sm {
      background: var(--surface2);
      border: none;
      color: var(--text);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-sm:hover { background: #333; }
    .btn-sm.primary { background: var(--orange); }
    .btn-sm.primary:hover { background: var(--orange-dark); }

    .timer-duration-input {
      width: 52px;
      background: var(--surface2);
      border: 1px solid #444;
      color: var(--text);
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 0.8rem;
      text-align: center;
    }

    /* ── SCOREBOARD ── */
    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      width: 100%;
      max-width: 900px;
      align-items: start;
    }

    .team {
      background: var(--surface);
      border-radius: 16px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .team-name {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
      border: none;
      background: transparent;
      color: var(--text);
      width: 100%;
      outline: none;
      border-bottom: 2px solid transparent;
      transition: border-color .2s;
      cursor: text;
    }
    .team-name:focus { border-bottom-color: var(--orange); }

    .score {
      font-size: clamp(4rem, 14vw, 8rem);
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--orange);
    }

    .score-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-score {
      background: var(--orange);
      border: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 800;
      border-radius: 10px;
      padding: 10px 18px;
      cursor: pointer;
      transition: background .12s, transform .1s;
      min-width: 54px;
    }
    .btn-score:hover  { background: var(--orange-dark); }
    .btn-score:active { transform: scale(.95); }
    .btn-score.minus  { background: var(--surface2); color: var(--muted); }
    .btn-score.minus:hover { background: #333; color: var(--text); }

    /* fouls */
    .fouls-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
    }
    .fouls-label { color: var(--muted); font-weight: 600; }
    .foul-dots {
      display: flex;
      gap: 4px;
    }
    .foul-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      cursor: pointer;
      transition: background .12s, border-color .12s;
    }
    .foul-dot.active { background: var(--red); border-color: var(--red); }

    /* ── CENTER (VS) ── */
    .vs-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 30px;
      gap: 12px;
    }
    .vs-text {
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 2px;
    }

    /* ── ACTION BUTTONS ── */
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 900px;
    }

    .btn-action {
      background: var(--surface);
      border: none;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-action:hover { background: var(--surface2); }
    .btn-action.danger { color: var(--red); }
    .btn-action.danger:hover { background: #2a1010; }

    /* ── HISTORY ── */
    .history-block {
      width: 100%;
      max-width: 900px;
    }
    details summary {
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--muted);
      padding: 6px 0;
      user-select: none;
    }
    .history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    .history-list li {
      background: var(--surface);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .history-list li span { color: var(--text); font-weight: 600; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 16px;
      padding: 28px 32px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 320px;
      width: 90%;
    }
    .modal h2 { font-size: 1.1rem; }
    .modal p  { font-size: 0.9rem; color: var(--muted); }
    .modal .btn-row { display: flex; gap: 10px; justify-content: center; }

    @media (max-width: 600px) {
      .scoreboard { grid-template-columns: 1fr 1fr; }
      .vs-col { display: none; }
    }
  </style>
</head>
<body>
  <h1>🏀 Marcador</h1>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="period-group" id="periodBtns"></div>

    <div class="timer-block">
      <div class="timer-display" id="timerDisplay" title="Haz clic para iniciar/pausar">00:00</div>
      <div class="timer-controls">
        <button class="btn-sm primary" id="btnStartStop">▶ Iniciar</button>
        <button class="btn-sm" id="btnResetTimer">↺ Reset</button>
        <input class="timer-duration-input" id="timerMinInput" type="number" min="1" max="99" value="10" title="Minutos por cuarto" />
        <span style="font-size:.8rem;color:var(--muted);align-self:center">min</span>
      </div>
    </div>
  </div>

  <!-- SCOREBOARD -->
  <div class="scoreboard">
    <!-- TEAM A -->
    <div class="team">
      <input class="team-name" id="nameA" type="text" value="LOCAL" maxlength="20" />
      <div class="score" id="scoreA">0</div>
      <div class="score-btns">
        <button class="btn-score" onclick="addScore('A',1)">+1</button>
        <button class="btn-score" onclick="addScore('A',2)">+2</button>
        <button class="btn-score" onclick="addScore('A',3)">+3</button>
        <button class="btn-score minus" onclick="addScore('A',-1)">−1</button>
      </div>
      <div class="fouls-row">
        <span class="fouls-label">Faltas:</span>
        <div class="foul-dots" id="foulsA"></div>
        <button class="btn-sm" onclick="clearFouls('A')">✕</button>
      </div>
    </div>

    <!-- VS -->
    <div class="vs-col">
      <span class="vs-text">VS</span>
    </div>

    <!-- TEAM B -->
    <div class="team">
      <input class="team-name" id="nameB" type="text" value="VISITANTE" maxlength="20" />
      <div class="score" id="scoreB">0</div>
      <div class="score-btns">
        <button class="btn-score" onclick="addScore('B',1)">+1</button>
        <button class="btn-score" onclick="addScore('B',2)">+2</button>
        <button class="btn-score" onclick="addScore('B',3)">+3</button>
        <button class="btn-score minus" onclick="addScore('B',-1)">−1</button>
      </div>
      <div class="fouls-row">
        <span class="fouls-label">Faltas:</span>
        <div class="foul-dots" id="foulsB"></div>
        <button class="btn-sm" onclick="clearFouls('B')">✕</button>
      </div>
    </div>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="actions">
    <button class="btn-action" onclick="undoLast()">↩ Deshacer</button>
    <button class="btn-action danger" onclick="openResetModal()">🔄 Reiniciar partido</button>
  </div>

  <!-- HISTORY -->
  <div class="history-block">
    <details>
      <summary>📋 Historial de puntos</summary>
      <ul class="history-list" id="historyList"></ul>
    </details>
  </div>

  <!-- RESET MODAL -->
  <div class="modal-overlay" id="resetModal">
    <div class="modal">
      <h2>¿Reiniciar partido?</h2>
      <p>Se borrarán todos los puntos, faltas e historial.</p>
      <div class="btn-row">
        <button class="btn-sm primary" onclick="confirmReset()">Sí, reiniciar</button>
        <button class="btn-sm" onclick="closeResetModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    // ─── STATE ───────────────────────────────────────────────────────────────
    const state = {
      scores: { A: 0, B: 0 },
      fouls:  { A: 0, B: 0 },
      period: 1,
      history: [],   // { team, pts, period, time }
    };

    const PERIODS = ['Q1','Q2','Q3','Q4','OT'];
    const MAX_FOULS = 5;

    // ─── PERIOD BUTTONS ───────────────────────────────────────────────────────
    function renderPeriodBtns() {
      const container = document.getElementById('periodBtns');
      container.innerHTML = '';
      PERIODS.forEach((p, i) => {
        const btn = document.createElement('button');
        btn.className = 'period-btn' + (state.period === i+1 ? ' active' : '');
        btn.textContent = p;
        btn.onclick = () => { state.period = i+1; renderPeriodBtns(); };
        container.appendChild(btn);
      });
    }

    // ─── SCORE ────────────────────────────────────────────────────────────────
    function addScore(team, pts) {
      state.scores[team] = Math.max(0, state.scores[team] + pts);
      state.history.push({
        team,
        pts,
        period: PERIODS[state.period - 1],
        time: document.getElementById('timerDisplay').textContent,
        scoreA: state.scores.A,
        scoreB: state.scores.B,
      });
      render();
    }

    function undoLast() {
      const last = state.history.pop();
      if (!last) return;
      state.scores[last.team] = Math.max(0, state.scores[last.team] - last.pts);
      render();
    }

    // ─── FOULS ────────────────────────────────────────────────────────────────
    function renderFouls(team) {
      const container = document.getElementById('fouls' + team);
      container.innerHTML = '';
      for (let i = 0; i < MAX_FOULS; i++) {
        const dot = document.createElement('div');
        dot.className = 'foul-dot' + (i < state.fouls[team] ? ' active' : '');
        dot.title = i < state.fouls[team] ? 'Quitar falta' : 'Añadir falta';
        dot.onclick = () => {
          if (i < state.fouls[team]) {
            state.fouls[team] = i; // remove from this dot onwards
          } else {
            state.fouls[team] = i + 1;
          }
          renderFouls(team);
        };
        container.appendChild(dot);
      }
    }

    function clearFouls(team) {
      state.fouls[team] = 0;
      renderFouls(team);
    }

    // ─── HISTORY ──────────────────────────────────────────────────────────────
    function renderHistory() {
      const list = document.getElementById('historyList');
      list.innerHTML = '';
      [...state.history].reverse().forEach(e => {
        const li = document.createElement('li');
        const teamName = document.getElementById('name' + e.team).value || e.team;
        const sign = e.pts > 0 ? '+' : '';
        li.innerHTML = `[${e.period} · ${e.time}] <span>${teamName}</span> ${sign}${e.pts}  →  ${e.scoreA} – ${e.scoreB}`;
        list.appendChild(li);
      });
    }

    // ─── RENDER ───────────────────────────────────────────────────────────────
    function render() {
      document.getElementById('scoreA').textContent = state.scores.A;
      document.getElementById('scoreB').textContent = state.scores.B;
      renderFouls('A');
      renderFouls('B');
      renderHistory();
    }

    // ─── TIMER ───────────────────────────────────────────────────────────────
    let timerRunning = false;
    let timerSeconds = 0;
    let timerInterval = null;

    function getConfiguredSeconds() {
      const mins = parseInt(document.getElementById('timerMinInput').value, 10) || 10;
      return mins * 60;
    }

    function formatTime(s) {
      const m = Math.floor(s / 60).toString().padStart(2, '0');
      const sec = (s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    function updateTimerDisplay() {
      const el = document.getElementById('timerDisplay');
      el.textContent = formatTime(timerSeconds);
      el.className = 'timer-display' + (timerRunning ? ' running' : '') + (timerSeconds <= 30 && timerSeconds > 0 ? ' low' : '');
    }

    function startTimer() {
      if (timerSeconds === 0) timerSeconds = getConfiguredSeconds();
      timerRunning = true;
      document.getElementById('btnStartStop').textContent = '⏸ Pausar';
      timerInterval = setInterval(() => {
        if (timerSeconds <= 0) { stopTimer(); return; }
        timerSeconds--;
        updateTimerDisplay();
      }, 1000);
    }

    function stopTimer() {
      timerRunning = false;
      clearInterval(timerInterval);
      document.getElementById('btnStartStop').textContent = '▶ Iniciar';
      updateTimerDisplay();
    }

    function toggleTimer() {
      timerRunning ? stopTimer() : startTimer();
    }

    function resetTimer() {
      stopTimer();
      timerSeconds = getConfiguredSeconds();
      updateTimerDisplay();
    }

    document.getElementById('btnStartStop').onclick  = toggleTimer;
    document.getElementById('btnResetTimer').onclick  = resetTimer;
    document.getElementById('timerDisplay').onclick   = toggleTimer;
    document.getElementById('timerMinInput').addEventListener('change', () => {
      if (!timerRunning) resetTimer();
    });

    // ─── RESET MODAL ──────────────────────────────────────────────────────────
    function openResetModal()  { document.getElementById('resetModal').classList.add('open'); }
    function closeResetModal() { document.getElementById('resetModal').classList.remove('open'); }
    function confirmReset() {
      state.scores = { A: 0, B: 0 };
      state.fouls  = { A: 0, B: 0 };
      state.period = 1;
      state.history = [];
      stopTimer();
      timerSeconds = getConfiguredSeconds();
      updateTimerDisplay();
      renderPeriodBtns();
      render();
      closeResetModal();
    }

    // close modal clicking backdrop
    document.getElementById('resetModal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeResetModal();
    });

    // ─── KEYBOARD SHORTCUTS ──────────────────────────────────────────────────
    // Space = start/stop timer | Z = undo | R = reset modal
    document.addEventListener('keydown', e => {
      if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
      if (e.code === 'Space')   { e.preventDefault(); toggleTimer(); }
      if (e.key  === 'z' || e.key === 'Z') undoLast();
    });

    // ─── INIT ─────────────────────────────────────────────────────────────────
    renderPeriodBtns();
    timerSeconds = getConfiguredSeconds();
    updateTimerDisplay();
    render();
  </script>
</body>
</html>
